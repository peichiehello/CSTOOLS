<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>銘勁汽車｜CS特案報告產生器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f4f1ec;
  --sidebar: #1c1c1e;
  --sidebar-text: #e8e4dd;
  --accent: #c8a96e;
  --accent-dim: #c8a96e33;
  --border: #3a3a3c;
  --input-bg: #2a2a2c;
  --green: #32d74b;
  --red: #ff453a;
}
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: #1a1a1a; min-height: 100vh; font-size: 14px; }

/* ══ Layout ══ */
.app { display: grid; grid-template-columns: 400px 1fr; min-height: 100vh; }
.sidebar { background: var(--sidebar); color: var(--sidebar-text); display: flex; flex-direction: column; overflow-y: auto; }
.sidebar-inner { padding: 1.5rem; flex: 1; }
.main { overflow-y: auto; }

/* ══ Sidebar Header ══ */
.sidebar-header { padding-bottom: 1.25rem; border-bottom: 0.5px solid var(--border); margin-bottom: 1.5rem; }
.logo-row { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.logo-badge { background: var(--accent); border-radius: 4px; padding: 3px 8px; font-size: 13px; font-weight: 700; color: #1a1a1c; letter-spacing: 0.05em; }
.sidebar-header h1 { font-size: 15px; font-weight: 700; }
.sidebar-header .sub { font-size: 11px; color: #6e6e73; margin-top: 2px; }

/* ══ View Tabs ══ */
.view-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 1.5rem; }
.vtab { padding: 9px; border: 0.5px solid var(--border); border-radius: 7px; background: var(--input-bg); color: #8e8e93; font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; transition: all .15s; text-align: center; }
.vtab.active { background: var(--accent); color: #1a1a1c; border-color: var(--accent); font-weight: 700; }
.vtab:hover:not(.active) { background: #3a3a3c; color: var(--sidebar-text); }

/* ══ Form Fields ══ */
.section { margin-bottom: 1.4rem; }
.section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #6e6e73; margin-bottom: 0.65rem; }
.field { margin-bottom: 0.65rem; }
.field label { display: block; font-size: 11px; color: #8e8e93; margin-bottom: 3px; }
.field input, .field textarea, .field select {
  width: 100%; background: var(--input-bg); border: 0.5px solid var(--border);
  border-radius: 6px; padding: 8px 10px; font-size: 13px;
  color: var(--sidebar-text); font-family: inherit; outline: none; transition: border-color .15s;
}
.field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); }
.field textarea { resize: vertical; min-height: 64px; line-height: 1.55; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.field-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

/* ══ 報告項目 Checkboxes ══ */
.check-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.check-item { display: flex; align-items: center; gap: 6px; background: var(--input-bg); border: 0.5px solid var(--border); border-radius: 5px; padding: 7px 9px; cursor: pointer; transition: all .15s; }
.check-item:hover { border-color: var(--accent); }
.check-item input[type=checkbox] { accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer; }
.check-item span { font-size: 12px; color: #c8c4bd; }
.check-item.checked { border-color: var(--accent); background: #2a2510; }
.check-item.checked span { color: var(--accent); }

/* ══ 需會簽提示 ══ */
.cosign-notice { background: #2a1e10; border: 0.5px solid var(--accent); border-radius: 6px; padding: 8px 12px; font-size: 11px; color: var(--accent); margin-top: 8px; display: none; }
.cosign-notice.show { display: block; }

/* ══ Sidebar Footer ══ */
.sidebar-footer { padding: 1rem 1.5rem 1.5rem; border-top: 0.5px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
.btn-generate { width: 100%; padding: 12px; background: var(--accent); color: #1a1a1c; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; transition: opacity .15s; }
.btn-generate:hover { opacity: 0.85; }
.btn-save { width: 100%; padding: 10px; background: #1e2e20; border: 0.5px solid #32d74b55; border-radius: 8px; font-size: 13px; font-weight: 600; color: var(--green); cursor: pointer; font-family: inherit; display: none; }
.btn-save:hover { background: #243024; }
.btn-clear { width: 100%; padding: 8px; background: transparent; border: 0.5px solid var(--border); border-radius: 6px; font-size: 12px; color: #6e6e73; cursor: pointer; font-family: inherit; }
.btn-clear:hover { border-color: #5e5e63; color: #8e8e93; }

/* ══ Main Area ══ */
.main-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 2rem; background: var(--bg); border-bottom: 0.5px solid #ddd; position: sticky; top: 0; z-index: 10; }
.main-toolbar h2 { font-size: 13px; font-weight: 500; color: #8e8e8e; }
.btn-print { padding: 8px 18px; background: #1a1a1c; color: #e8e4dd; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }
.btn-print:hover { opacity: 0.8; }
.main-content { padding: 2rem; }

/* ══ Preview Placeholder ══ */
.preview-placeholder { text-align: center; padding: 5rem 2rem; color: #aaa; font-size: 14px; background: white; border-radius: 4px; max-width: 800px; margin: 0 auto; }

/* ══ 後台管理 ══ */
.records-wrap { max-width: 960px; margin: 0 auto; }
.records-top { display: flex; align-items: center; gap: 12px; margin-bottom: 1.25rem; }
.records-top input { flex: 1; background: #fff; border: 0.5px solid #ddd; border-radius: 6px; padding: 8px 12px; font-size: 13px; font-family: inherit; outline: none; }
.records-top input:focus { border-color: #999; }
.rec-count { font-size: 12px; color: #8e8e93; white-space: nowrap; }
.btn-export { padding: 8px 16px; background: #1a1a1c; color: #e8e4dd; border: none; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; white-space: nowrap; }
.rec-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); font-size: 13px; }
.rec-table th { background: #1a1a1c; color: #e8e4dd; padding: 10px 12px; text-align: left; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; white-space: nowrap; }
.rec-table td { padding: 9px 12px; border-bottom: 0.5px solid #f0ede8; vertical-align: middle; }
.rec-table tr:last-child td { border-bottom: none; }
.rec-table tr:hover td { background: #faf8f5; }
.rec-id { color: #8e8e93; font-size: 11px; font-family: monospace; }
.rec-empty { text-align: center; padding: 3rem; color: #aaa; font-size: 14px; }
.btn-rec-action { padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; font-family: inherit; border: 0.5px solid; transition: all .15s; margin-right: 4px; }
.btn-agreement { background: #f0f8ff; border-color: #4a9eff; color: #1a6fd4; }
.btn-agreement:hover { background: #dff0ff; }
.btn-detail { background: #f5f5f5; border-color: #ccc; color: #555; }
.btn-detail:hover { background: #ebebeb; }
.btn-del-rec { background: #fff0f0; border-color: #ffb3b3; color: var(--red); }
.btn-del-rec:hover { background: #ffe0e0; }
.tag-cosign { display: inline-block; background: #fff3e0; border: 0.5px solid #ffb74d; color: #e65100; font-size: 10px; padding: 1px 6px; border-radius: 3px; margin-left: 4px; }

/* ══ 明細 Modal ══ */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; display: none; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: #fff; border-radius: 10px; padding: 2rem; max-width: 680px; width: 90%; max-height: 85vh; overflow-y: auto; position: relative; }
.modal-close { position: absolute; top: 1rem; right: 1rem; background: none; border: none; font-size: 20px; cursor: pointer; color: #666; }
.modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 1.25rem; padding-bottom: 0.75rem; border-bottom: 1px solid #eee; }
.modal-grid { display: grid; grid-template-columns: 120px 1fr; gap: 6px 12px; font-size: 13px; }
.modal-grid .mk { color: #888; font-size: 12px; }
.modal-grid .mv { color: #1a1a1a; }
.modal-section { margin-top: 1rem; padding-top: 1rem; border-top: 0.5px solid #eee; }
.modal-section h4 { font-size: 12px; font-weight: 700; color: #888; letter-spacing: 0.1em; margin-bottom: 8px; }
.modal-content-text { font-size: 13px; line-height: 1.7; color: #333; white-space: pre-wrap; }
.modal-footer { margin-top: 1.5rem; display: flex; gap: 8px; justify-content: flex-end; }
.btn-modal-agreement { padding: 10px 20px; background: #1a1a1c; color: #e8e4dd; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
.btn-modal-close-action { padding: 10px 16px; background: #f0ede8; color: #1a1a1c; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; font-family: inherit; }

/* ══ 報告文件 ══ */
#doc-output { background: #fff; width: 100%; max-width: 800px; margin: 0 auto; padding: 24px 32px; border-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); font-family: 'Noto Sans TC', sans-serif; font-size: 12px; line-height: 1.6; color: #1a1a1a; display: none; }
.report-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
.report-company { font-size: 12px; color: #333; }
.report-mg-logo { font-size: 22px; font-weight: 900; font-family: serif; letter-spacing: -1px; border: 2px solid #1a1a1a; padding: 2px 8px; }
.report-title { text-align: center; font-size: 16px; font-weight: 700; margin-bottom: 14px; letter-spacing: 0.05em; }
.report-table { width: 100%; border-collapse: collapse; margin-bottom: 0; table-layout: fixed; }
.report-table td, .report-table th { border: 1px solid #999; padding: 5px 8px; font-size: 12px; vertical-align: top; word-break: break-all; overflow-wrap: break-word; }
.report-table .cell-label { width: 88px; white-space: nowrap; overflow: visible; font-size: 11px; }
.report-table col.col-label { width: 72px; }
.report-table col.col-value { width: auto; }
.report-table .cell-label { background: #f5f5f5; font-weight: 500; white-space: nowrap; width: 80px; text-align: center; }
.report-table .cell-wide { min-height: 20px; }
.report-content-row td { vertical-align: top; }
.content-label { font-weight: 500; white-space: nowrap; }
.check-row { display: flex; flex-wrap: wrap; gap: 4px 16px; font-size: 12px; margin-bottom: 6px; }
.check-box { display: inline-flex; align-items: center; gap: 4px; }
.check-box .box { width: 12px; height: 12px; border: 1px solid #666; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; }
.check-box .box.checked { background: #1a1a1a; color: #fff; }
.sign-table { width: 100%; border-collapse: collapse; margin-top: 0; table-layout: fixed; }
.sign-table td { border: 1px solid #999; padding: 4px 6px; font-size: 11px; text-align: center; height: 44px; vertical-align: top; }
.sign-table .sign-label { background: #f5f5f5; font-weight: 500; height: 22px; vertical-align: middle; }
.sign-table .sign-name-row { height: 22px; font-size: 11px; color: #333; vertical-align: middle; }
.disclaimer { font-size: 10px; color: #555; margin: 6px 0; line-height: 1.5; border-top: 0.5px solid #ccc; padding-top: 5px; }
.cosign-row { background: #fff8f0; }
.report-footnote { font-size: 10px; color: #555; margin-top: 5px; line-height: 1.6; }

/* ══ 密碼 Modal ══ */
.pwd-modal-box { background: #fff; border-radius: 12px; padding: 2rem 2rem 1.5rem; width: 320px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
.pwd-modal-icon { font-size: 32px; margin-bottom: 0.75rem; }
.pwd-modal-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
.pwd-modal-sub { font-size: 12px; color: #8e8e93; margin-bottom: 1.25rem; }
.pwd-input { width: 100%; border: 1.5px solid #ddd; border-radius: 8px; padding: 10px 12px; font-size: 15px; text-align: center; letter-spacing: 0.2em; outline: none; font-family: inherit; margin-bottom: 8px; }
.pwd-input:focus { border-color: var(--accent); }
.pwd-error { font-size: 12px; color: var(--red); margin-bottom: 10px; }
.pwd-modal-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 1rem; }
.pwd-btn-cancel { padding: 10px; background: #f0ede8; border: none; border-radius: 7px; font-size: 13px; cursor: pointer; font-family: inherit; }
.pwd-btn-confirm { padding: 10px; background: var(--accent); border: none; border-radius: 7px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; color: #1a1a1c; }
.pwd-btn-confirm:hover { opacity: 0.85; }

/* ══ Print ══ */
@media print {
  @page { size: A4 portrait; margin: 8mm 10mm; }
  html, body { width: 100%; height: 100%; }
  body { background: white; margin: 0; padding: 0; }
  .app { display: block; width: 100%; }
  .sidebar, .main-toolbar { display: none !important; }
  .main-content { padding: 0; margin: 0; width: 100%; }
  #doc-output {
    box-shadow: none !important;
    width: 100% !important;
    max-width: 100% !important;
    padding: 0 !important;
    margin: 0 !important;
    border-radius: 0 !important;
    display: block !important;
    font-size: 11px;
    transform: none !important;
  }
  .report-table { width: 100% !important; }
  .sign-table { width: 100% !important; }
  .preview-placeholder, #records-view { display: none !important; }
  .modal-overlay { display: none !important; }
  .sign-table td, .report-table td, .report-table th { border-color: #555; }
  .report-footnote { font-size: 9px; }
  /* 隱藏提示浮層 */
  .save-notice { display: none !important; }
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
<div class="app">

<!-- ════ Sidebar ════ -->
<aside class="sidebar">
<div class="sidebar-inner">

  <div class="sidebar-header">
    <div class="logo-row">
      <div class="logo-badge">CS</div>
      <h1>特案報告產生器</h1>
    </div>
    <div class="sub">銘勁汽車股份有限公司｜顧客關係部</div>
  </div>

  <div class="view-tabs">
    <button class="vtab active" id="vtab-form" onclick="switchView('form')">📝 填寫報告</button>
    <button class="vtab" id="vtab-records" onclick="switchView('records')">🔒 後台管理</button>
  </div>

  <!-- 申請資訊 -->
  <div class="section">
    <div class="section-label">申請資訊</div>
    <div class="field">
      <label>申請單位</label>
      <select id="f-unit" onchange="onUnitChange()">
        <option value="">請選擇</option>
        <option value="中壢服務廠">中壢服務廠</option>
        <option value="八德服務廠">八德服務廠</option>
        <option value="中壢營業所">中壢營業所</option>
        <option value="八德營業所">八德營業所</option>
        <option value="桃園營業所">桃園營業所</option>
      </select>
    </div>
    <div class="field">
      <label>負責業務姓名</label>
      <input type="text" id="f-staff" placeholder="填寫人姓名">
    </div>
  </div>

  <!-- 客戶車輛 -->
  <div class="section">
    <div class="section-label">客戶與車輛</div>
    <div class="field">
      <label>顧客姓名</label>
      <input type="text" id="f-customer" placeholder="">
    </div>
    <div class="field">
      <label>車號／引擎碼</label>
      <input type="text" id="f-vehicle" placeholder="例：CFJ5886/4240225/HS 白">
    </div>
    <div class="field">
      <label>聯絡電話</label>
      <input type="text" id="f-phone" placeholder="0912-345-678">
    </div>
    <div class="field">
      <label>交車日期</label>
      <input type="date" id="f-delivery">
    </div>
  </div>

  <!-- 主旨 -->
  <div class="section">
    <div class="section-label">主旨</div>
    <div class="field">
      <textarea id="f-subject" rows="2" placeholder="簡述客訴事由"></textarea>
    </div>
  </div>

  <!-- 報告項目 -->
  <div class="section">
    <div class="section-label">報告項目（可複選）</div>
    <div class="check-grid" id="check-grid">
      <label class="check-item" onclick="toggleCheck(this)">
        <input type="checkbox" value="交車後客怨" onchange="onCheckChange()"><span>交車後客怨</span>
      </label>
      <label class="check-item" onclick="toggleCheck(this)">
        <input type="checkbox" value="SSI案件" onchange="onCheckChange()"><span>SSI 案件</span>
      </label>
      <label class="check-item" onclick="toggleCheck(this)">
        <input type="checkbox" value="CSI案件" onchange="onCheckChange()"><span>CSI 案件</span>
      </label>
      <label class="check-item" onclick="toggleCheck(this)">
        <input type="checkbox" value="試乘案件" onchange="onCheckChange()"><span>試乘案件</span>
      </label>
      <label class="check-item" onclick="toggleCheck(this)">
        <input type="checkbox" value="0800案件" onchange="onCheckChange()"><span>0800 案件</span>
      </label>
      <label class="check-item" onclick="toggleCheck(this)">
        <input type="checkbox" value="其他" onchange="onCheckChange()"><span>其他</span>
      </label>
    </div>
    <div class="cosign-notice" id="cosign-notice">
      ⚠️ 涉及新車/PDI/贈品/維修項目，將自動加入會簽服務廠欄位
    </div>
  </div>

  <!-- 報告內容 -->
  <div class="section">
    <div class="section-label">報告內容</div>
    <div class="field">
      <label>處理需求說明</label>
      <textarea id="f-content" rows="5" placeholder="說明事件經過、處理方式及客戶需求…"></textarea>
    </div>
    <div class="field">
      <label>相關金額（選填）</label>
      <input type="text" id="f-amount" placeholder="例：申請金額 1850 元">
    </div>
    <div class="field">
      <label>請附件（可複選）</label>
      <div class="check-grid" id="attach-grid" style="margin-bottom:6px;">
        <label class="check-item" onclick="toggleAttach(this)">
          <input type="checkbox" value="照片" onchange="onAttachChange()"><span>照片</span>
        </label>
        <label class="check-item" onclick="toggleAttach(this)">
          <input type="checkbox" value="報價單" onchange="onAttachChange()"><span>報價單</span>
        </label>
        <label class="check-item" onclick="toggleAttach(this)">
          <input type="checkbox" value="通訊記錄" onchange="onAttachChange()"><span>通訊記錄</span>
        </label>
        <label class="check-item" onclick="toggleAttach(this)">
          <input type="checkbox" value="其他" onchange="onAttachChange()"><span>其他</span>
        </label>
      </div>
      <input type="text" id="f-attachment-other" placeholder="其他（請說明）" style="display:none;">
    </div>
  </div>

</div>
<div class="sidebar-footer">
  <button class="btn-generate" onclick="generateReport()">產生報告預覽</button>
  <button class="btn-save" id="btn-save" onclick="saveRecord()">💾 儲存檔案</button>
  <button class="btn-clear" onclick="clearForm()">↺ 清除重填</button>
</div>
</aside>

<!-- ════ Main ════ -->
<main class="main">
  <div class="main-toolbar">
    <h2 id="main-title">特案報告預覽</h2>
    <div id="toolbar-form-btns" style="display:flex;gap:8px;">
      <button class="btn-print" onclick="saveAndPrint()">🖨 儲存並列印</button>
      <button class="btn-print" onclick="savePDF()" style="background:#c8a96e;color:#1a1a1c;">⬇ 存 PDF</button>
    </div>
    <div id="toolbar-rec-btns" style="display:none;">
      <button class="btn-export" onclick="exportCSV()">⬇ 匯出 CSV</button>
    </div>
  </div>

  <div class="main-content">
    <div id="form-view">
      <div class="preview-placeholder" id="preview-placeholder">填寫左側資料後，點擊「產生報告預覽」</div>
      <div id="doc-output"></div>
    </div>

    <div id="records-view" style="display:none;">
      <div class="records-wrap">
        <div class="records-top">
          <input type="text" id="rec-search" placeholder="搜尋車號、姓名、申請單位…" oninput="renderRecords()">
          <span id="rec-count" class="rec-count"></span>
        </div>
        <div id="records-table-wrap"></div>
      </div>
    </div>
  </div>
</main>
</div>

<!-- ════ 明細 Modal ════ -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-content">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <h3>特案報告明細</h3>

// 工具函數

function val(id) { return (document.getElementById(id)?.value || '').trim(); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function genId() {
  const now = new Date();
  const y = now.getFullYear() - 1911;
  const m = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  const records = loadRecords();
  const prefix = y + m + d;
  const count = records.filter(r => r.id && r.id.startsWith('CS-'+prefix)).length + 1;
  return 'CS-' + prefix + '-' + String(count).padStart(2,'0');
}
function formatDate(dateStr) {
  if (!dateStr) return '';
  const [y, m, d] = dateStr.split('-');
  return `${parseInt(y)-1911}/${m}/${d}`;
}
function formatDisplayDate(dateStr) {
  if (!dateStr) return '';
  // 已經是民國格式 115/05/15
  if (/^\d{2,3}\/\d{2}\/\d{2}$/.test(dateStr)) return dateStr;
  // 嘗試解析
  try {
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return todayROC();
    const fullYear = d.getFullYear();
    // 年份異常（小於 1911 或超過 2100）→ 用今天
    if (fullYear < 1911 || fullYear > 2100) return todayROC();
    const y = fullYear - 1911;
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    return y + '/' + m + '/' + day;
  } catch(e) { return todayROC(); }
}

function todayROC() {
  const now = new Date();
  const y = now.getFullYear() - 1911;
  const m = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  return `${y}/${m}/${d}`;
}

function toggleAttach(label) {
  const cb = label.querySelector('input[type=checkbox]');
  setTimeout(() => {
    label.classList.toggle('checked', cb.checked);
    onAttachChange();
  }, 0);
}

function onAttachChange() {
  const checked = [...document.querySelectorAll('#attach-grid input[type=checkbox]')]
    .filter(cb => cb.checked).map(cb => cb.value);
  const otherInput = document.getElementById('f-attachment-other');
  otherInput.style.display = checked.includes('其他') ? 'block' : 'none';
}

function getAttachment() {
  const checked = [...document.querySelectorAll('#attach-grid input[type=checkbox]')]
    .filter(cb => cb.checked).map(cb => cb.value);
  if (checked.length === 0) return '';
  const other = document.getElementById('f-attachment-other').value.trim();
  return checked.map(v => v === '其他' && other ? `其他（${other}）` : v).join('、');
}

function toggleCheck(label) {
  const cb = label.querySelector('input[type=checkbox]');
  setTimeout(() => {
    label.classList.toggle('checked', cb.checked);
    onCheckChange();
  }, 0);
}

function onCheckChange() {
  const content = val('f-content');
  const unit = val('f-unit');
  const isSales = UNIT_TYPE[unit] === 'sales';
  const hasKeyword = COSIGN_KEYWORDS.some(k => content.includes(k));
  const notice = document.getElementById('cosign-notice');
  if (isSales && hasKeyword) notice.classList.add('show');
  else notice.classList.remove('show');
}

function onUnitChange() { onCheckChange(); }

function getChecked() {
  return [...document.querySelectorAll('#check-grid input[type=checkbox]')]
    .filter(cb => cb.checked).map(cb => cb.value);
}

function needsCosign() {
  const unit = val('f-unit');

}

function showPasswordModal() {
  document.getElementById('pwd-modal').classList.add('show');
  setTimeout(() => document.getElementById('pwd-input').focus(), 100);
}

function submitPassword() {
  const input = document.getElementById('pwd-input').value;
  if (input === ADMIN_PWD) {
    sessionStorage.setItem(ADMIN_KEY, '1');
    document.getElementById('pwd-modal').classList.remove('show');
    document.getElementById('pwd-input').value = '';
    document.getElementById('pwd-error').style.display = 'none';
    applyView('records');
  } else {
    document.getElementById('pwd-error').style.display = 'block';
    document.getElementById('pwd-input').value = '';
    document.getElementById('pwd-input').focus();
  }
}

function closePwdModal() {
  document.getElementById('pwd-modal').classList.remove('show');
  document.getElementById('pwd-input').value = '';
  document.getElementById('pwd-error').style.display = 'none';
}

function clearForm() {
  ['f-unit','f-staff','f-customer','f-vehicle','f-phone','f-delivery','f-subject','f-content','f-amount','f-attachment-other']
    .forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; });

// ══════════════════════════
// 紀錄管理
// ══════════════════════════
function loadRecordsLocal() {
  try { return JSON.parse(localStorage.getItem(CS_KEY)) || []; }
  catch(e) { return []; }
}
function saveRecordsLocal(records) {
  localStorage.setItem(CS_KEY, JSON.stringify(records));
}
// 同步包裝（非 Sheets 路徑用）
function loadRecords() { return loadRecordsLocal(); }
function saveRecordsData(r) { saveRecordsLocal(r); }

// ── Google Sheets API ──
async function apiGet() {
  const res = await fetch(API_URL + '?action=getAll');
  const json = await res.json();
  return json.ok ? json.data : [];
}
async function apiSave(record) {
  await fetch(API_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'save', record })
  });
}
async function apiDelete(id) {
  await fetch(API_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'delete', id })
  });
}

async function saveRecord() {
  const customer = val('f-customer');
  const vehicle  = val('f-vehicle');
  if (!customer || !vehicle) { alert('請至少填寫「顧客姓名」及「車號」再儲存。'); return; }

  const btn = document.getElementById('btn-save');
  btn.textContent = '⏳ 儲存中...';
  btn.disabled = true;

  const record = {
    id:         genId(),
    savedAt:    todayROC(),
    createdAt:  Date.now(),
    unit:       val('f-unit'),
    staff:      val('f-staff'),
    customer:   customer,
    vehicle:    vehicle,
    phone:      val('f-phone'),
    delivery:   val('f-delivery') ? formatDate(val('f-delivery')) : '',
    subject:    val('f-subject'),
    content:    val('f-content'),
    amount:     val('f-amount'),
    attachment: getAttachment(),
    items:      getChecked(),
    cosign:     needsCosign(),
    cosignUnit: getCosignUnit()
  };

  try {
    if (USE_SHEETS) {
      await apiSave(record);
    }
    // 同步寫入 localStorage 作為快取
    const records = loadRecordsLocal();
    records.unshift(record);
    saveRecordsLocal(records);

    btn.textContent = '💾 儲存檔案';
    btn.disabled = false;
    const notice = document.createElement('div');
    notice.className = 'save-notice';
    notice.style.cssText = 'position:fixed;top:16px;right:16px;background:#1e2e20;color:#32d74b;border:0.5px solid #32d74b55;border-radius:8px;padding:10px 16px;font-size:13px;z-index:999;font-family:sans-serif;';
    notice.textContent = '✓ 已儲存紀錄 ' + record.id;
    document.body.appendChild(notice);
    setTimeout(() => notice.remove(), 2500);
  } catch(e) {
    btn.textContent = '💾 儲存檔案';
    btn.disabled = false;
    alert('儲存失敗，請確認網路連線：' + e.message);
  }
}

async function deleteRecord(id) {
  if (!confirm('確定刪除紀錄 ' + id + '？')) return;
  try {
    if (USE_SHEETS) await apiDelete(id);
    saveRecordsLocal(loadRecordsLocal().filter(r => r.id !== id));
    renderRecords();
  } catch(e) {
    alert('刪除失敗：' + e.message);
  }
}

async function renderRecords() {
  const wrap = document.getElementById('records-table-wrap');
  if (wrap) wrap.innerHTML = '<div class="rec-empty">載入中...</div>';

  let records = [];
  try {
    if (USE_SHEETS) {
      records = await apiGet();
      // 同步更新本地快取
      saveRecordsLocal(records);
    } else {
      records = loadRecordsLocal();
    }
  } catch(e) {
    // 網路失敗時用本地快取
    records = loadRecordsLocal();
  }

  const kw = (document.getElementById('rec-search')?.value || '').trim().toLowerCase();
  let filteredRecords = records;
  if (kw) {
    records = records.filter(r =>
      (r.vehicle||'').toLowerCase().includes(kw) ||
      (r.customer||'').toLowerCase().includes(kw) ||
      (r.unit||'').toLowerCase().includes(kw) ||
      (r.id||'').toLowerCase().includes(kw)
    );
  }
  const countEl = document.getElementById('rec-count');
  if (countEl) countEl.textContent = '共 ' + records.length + ' 筆';
  if (!wrap) return;
  if (records.length === 0) {
    wrap.innerHTML = '<div class="rec-empty">' + (kw ? '找不到符合的紀錄' : '尚無紀錄') + '</div>';
    return;
  }
  let rows = '';
  records.forEach(r => {
    const cosignTag = r.cosign ? '<span class="tag-cosign">需會簽</span>' : '';
    rows += `<tr>
      <td class="rec-id">${esc(r.id)}</td>
      <td style="max-width:180px; color:#444; font-size:12px;">${esc((r.subject||'').substring(0,25))}${(r.subject||'').length>25?'…':''}</td>
      <td>${esc(r.unit)}${cosignTag}</td>
      <td><strong>${esc(r.vehicle)}</strong></td>
      <td>${esc(r.customer)}</td>
      <td style="white-space:nowrap; font-size:12px; color:#666;">${esc(formatDisplayDate(r.savedAt||''))}</td>
      <td>
        <button class="btn-rec-action btn-detail" onclick="loadRecordToForm('${r.id}')">📥 載入</button>
        <button class="btn-rec-action btn-detail" onclick="showDetail('${r.id}')">明細</button>
        <button class="btn-rec-action btn-agreement" onclick="openAgreement('${r.id}')">📄 協議書</button>
        <button class="btn-rec-action btn-del-rec" onclick="deleteRecord('${r.id}')">刪除</button>
      </td>
    </tr>`;
  });
  wrap.innerHTML = `<table class="rec-table">
    <thead><tr>
      <th>編號</th><th>主旨</th><th>申請單位</th><th>車號</th><th>顧客姓名</th><th>日期</th><th></th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// 明細 Modal
// ══════════════════════════
async function loadRecordToForm(id) {
  let r = null;
  try {
    if (USE_SHEETS) {
      const records = await apiGet();
      r = records.find(rec => rec.id === id);
      if (r) saveRecordsLocal(records);
    }
  } catch(e) {}
  if (!r) r = loadRecordsLocal().find(rec => rec.id === id);
  if (!r) return;

  // 切回填寫頁
  applyView('form');

  // 填入基本欄位
  const fm = {
    'f-unit':       r.unit,
    'f-staff':      r.staff,
    'f-customer':   r.customer,
    'f-vehicle':    r.vehicle,
    'f-phone':      r.phone,
    'f-subject':    r.subject,
    'f-content':    r.content,
    'f-amount':     r.amount,
    'f-attachment': r.attachment
  };
  Object.entries(fm).forEach(([id, v]) => {
    const el = document.getElementById(id);
    if (el && v) el.value = v;
  });

  // 交車日期：轉回 YYYY-MM-DD
  if (r.delivery) {
    const parts = r.delivery.split('/');
    if (parts.length === 3) {
      const y = parseInt(parts[0]) + 1911;
      document.getElementById('f-delivery').value = y + '-' + parts[1].padStart(2,'0') + '-' + parts[2].padStart(2,'0');
    }
  }

  // 勾選項目
  document.querySelectorAll('#check-grid input[type=checkbox]').forEach(cb => {
    const checked = (r.items||[]).includes(cb.value);
    cb.checked = checked;
    cb.closest('.check-item').classList.toggle('checked', checked);
  });

  onUnitChange();

  // 產生預覽
  generateReport();

  // 捲到頂部
  document.querySelector('.main-content').scrollTop = 0;

  // 提示
  const notice = document.createElement('div');
  notice.style.cssText = 'position:fixed;top:16px;right:16px;background:#1e2e20;color:#32d74b;border:0.5px solid #32d74b55;border-radius:8px;padding:10px 16px;font-size:13px;z-index:999;font-family:sans-serif;';
  notice.textContent = '✓ 已載入紀錄 ' + r.id;
  document.body.appendChild(notice);
  setTimeout(() => notice.remove(), 2500);
}

function closeModal(e) {

function loadFromModal() {

  closeModalDirect();
}

// ══════════════════════════
// 連動協議書工具
// ══════════════════════════
async function openAgreement(id) {
  // 先從 Sheets 取得最新資料，找不到再用本地快取
  let r = null;
  try {
    if (USE_SHEETS) {
      const records = await apiGet();
      r = records.find(rec => rec.id === id);
      if (r) saveRecordsLocal(records); // 更新本地快取
    }
  } catch(e) {}
  if (!r) r = loadRecordsLocal().find(rec => rec.id === id);
  if (!r) { alert('找不到該筆紀錄，請重新整理後再試。'); return; }

  // 解析車牌和引擎號碼（格式：CFJ5886/4240225/HS 白）
  const parts = (r.vehicle || '').split('/');
  const plate  = parts[0] ? parts[0].trim().replace(/([A-Z]{3})([0-9]{4})/g, '$1-$2') : '';
  const engine = parts[1] ? parts[1].trim() : '';
  const modelColor = parts[2] ? parts[2].trim() : '';
  const color  = modelColor.match(/[白黑灰銀藍紅橘]/) ? modelColor.match(/[白黑灰銀藍紅橘]/)[0] : '';
  const model  = modelColor.replace(/[白黑灰銀藍紅橘]/g,'').trim();

  // 寫入 localStorage 讓協議書工具讀取
  const payload = {
    from_cs: true,
    cs_id:   r.id,
    name:    r.customer,
    plate:   plate,
    engine:  engine,
    model:   model,
    color:   color,
    reason:  '新車顧客滿意補償方案',
    ts:      Date.now()
  };
  localStorage.setItem('mg_agreement_prefill', JSON.stringify(payload));

  // 開啟協議書工具
  const win = window.open('agreement.html', '_blank');
  if (!win) alert('請允許彈出視窗，或手動開啟「agreement.html」，資料已備妥可自動帶入。');
}

function savePDF() {
  const doc = document.getElementById('doc-output');
  if (!doc || doc.style.display === 'none') {
    alert('請先產生報告預覽再存 PDF');
    return;
  }

  const unit = document.getElementById('f-unit')?.value || '';
  const customer = document.getElementById('f-customer')?.value || '';
  const plate = (document.getElementById('f-vehicle')?.value || '').split('/')[0].trim();
  const filename = `CS特案報告_${unit}_${customer}_${plate || '未填車號'}.pdf`;

  const btn = event.target;
  btn.textContent = '⏳ 產生中...';
  btn.disabled = true;

  const opt = {
    margin:      [6, 10, 6, 10],
    filename:    filename,
    image:       { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true, logging: false },
    jsPDF:       { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };

  html2pdf().set(opt).from(doc).save().then(() => {
    btn.textContent = '⬇ 存 PDF';
    btn.disabled = false;
  }).catch(e => {
    btn.textContent = '⬇ 存 PDF';
    btn.disabled = false;
    alert('PDF 產生失敗，請改用列印功能：' + e.message);
  });
}

function exportCSV() {
  const records = loadRecords();
  if (records.length === 0) { alert('目前沒有紀錄可匯出'); return; }
  const headers = ['編號','日期','申請單位','負責業務','顧客姓名','車號','主旨','相關金額','需會簽'];
  const rows = records.map(r =>
    [r.id, r.savedAt, r.unit, r.staff, r.customer, r.vehicle, r.subject, r.amount, r.cosign?'是':'']
      .map(v => '"' + (v||'').replace(/"/g,'""') + '"').join(',')
  );
  const blob = new Blob(['\uFEFF' + headers.join(',') + '\n' + rows.join('\n')], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = '銘勁汽車CS特案報告_' + todayROC().replace(/\//g,'-') + '.csv';
  a.click();
}
