<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>銘勁汽車｜協議書產生工具</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans TC', sans-serif; background: #f0ede8; color: #1a1a1a; min-height: 100vh; font-size: 14px; }

.app { display: grid; grid-template-columns: 440px 1fr; min-height: 100vh; }
.sidebar { background: #1a1a1c; color: #e8e4dd; overflow-y: auto; display: flex; flex-direction: column; }
.sidebar-inner { padding: 1.5rem; flex: 1; }
.preview-area { padding: 2rem; overflow-y: auto; }

/* Header */
.sidebar-header { padding-bottom: 1.25rem; border-bottom: 0.5px solid #2e2e30; margin-bottom: 1.5rem; }
.logo-row { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.logo-badge { background: #e8e4dd; border-radius: 4px; padding: 4px 7px; font-size: 13px; font-weight: 700; color: #1a1a1c; letter-spacing: 0.05em; }
.sidebar-header h1 { font-size: 16px; font-weight: 700; color: #e8e4dd; }
.sidebar-header .sub { font-size: 11px; color: #6e6e73; margin-top: 2px; }

/* Mode Tabs */
.mode-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 1.5rem; }
.tab-btn { padding: 10px; border: 0.5px solid #3a3a3c; border-radius: 7px; background: #2a2a2c; color: #8e8e93; font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; transition: all .15s; text-align: center; }
.tab-btn.active { background: #e8e4dd; color: #1a1a1c; border-color: #e8e4dd; }
.tab-btn:hover:not(.active) { background: #3a3a3c; color: #e8e4dd; }

/* PDF Section */
.upload-section { margin-bottom: 1.5rem; }
.section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #6e6e73; margin-bottom: 0.75rem; }

.upload-zone { border: 1.5px dashed #3a3a3c; border-radius: 8px; padding: 1.25rem; text-align: center; cursor: pointer; transition: all .15s; position: relative; }
.upload-zone:hover, .upload-zone.drag { border-color: #6e6e73; background: #2a2a2c; }
.upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.upload-zone .uz-icon { font-size: 24px; margin-bottom: 6px; }
.upload-zone .uz-title { font-size: 13px; font-weight: 500; color: #e8e4dd; margin-bottom: 3px; }
.upload-zone .uz-sub { font-size: 11px; color: #6e6e73; }
.upload-zone.has-file { border-color: #32d74b; border-style: solid; }
.upload-zone.has-file .uz-title { color: #32d74b; }

.btn-parse { width: 100%; padding: 11px; background: #2a2a2c; border: 0.5px solid #4a4a4c; border-radius: 7px; font-size: 13px; font-weight: 500; color: #e8e4dd; cursor: pointer; font-family: inherit; margin-top: 8px; transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-parse:hover:not(:disabled) { background: #3a3a3c; }
.btn-parse:disabled { opacity: 0.4; cursor: not-allowed; }

.parse-status { font-size: 12px; margin-top: 8px; text-align: center; min-height: 18px; }
.parse-status.ok { color: #32d74b; }
.parse-status.err { color: #ff453a; }
.parse-status.info { color: #ffd60a; }

/* 解析結果摘要 */
.parse-result-box { background: #1e2e20; border: 0.5px solid #32d74b44; border-radius: 7px; padding: 10px 12px; margin-top: 10px; font-size: 12px; display: none; }
.parse-result-box .pr-title { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; color: #32d74b; margin-bottom: 8px; }
.parse-result-item { display: flex; gap: 8px; margin-bottom: 4px; }
.parse-result-item .pk { color: #6e6e73; min-width: 80px; }
.parse-result-item .pv { color: #c8e8cc; }
.parse-result-item .pv.missing { color: #ff453a; font-style: italic; }

/* Fields */
.section { margin-bottom: 1.5rem; }
.field { margin-bottom: 0.7rem; }
.field label { display: block; font-size: 11px; color: #8e8e93; margin-bottom: 0.25rem; }
.field input, .field textarea, .field select {
  width: 100%; background: #2a2a2c; border: 0.5px solid #3a3a3c;
  border-radius: 6px; padding: 8px 10px; font-size: 13px;
  color: #e8e4dd; font-family: inherit; outline: none; transition: border-color .2s, background .2s;
}
.field input:focus, .field textarea:focus { border-color: #5e5e63; }
.field textarea { resize: vertical; min-height: 52px; line-height: 1.5; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.field-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

@keyframes flashGreen { 0%,100% { border-color: #3a3a3c; background: #2a2a2c; } 30% { border-color: #32d74b; background: #1e2e20; } }
.field input.ai-filled { animation: flashGreen 1.5s ease; }

/* 需人工補填提示 */
.manual-required { background: #2e2a1e; border: 0.5px solid #ffd60a44; border-radius: 6px; padding: 8px 12px; margin-bottom: 1.5rem; font-size: 11px; color: #ffd60a; display: none; }
.manual-required .mr-title { font-weight: 700; margin-bottom: 4px; }

/* Clauses */
.clause-list { display: flex; flex-direction: column; gap: 8px; }
.clause-item { background: #2a2a2c; border: 0.5px solid #3a3a3c; border-radius: 7px; padding: 10px 12px; }
.clause-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.clause-num { font-size: 11px; font-weight: 700; color: #6e6e73; min-width: 22px; }
.clause-title-input { flex: 1; background: transparent; border: none; border-bottom: 0.5px solid #3a3a3c; color: #e8e4dd; font-size: 12px; font-weight: 500; padding: 2px 0; outline: none; font-family: inherit; }
.clause-title-input:focus { border-bottom-color: #5e5e63; }
.clause-body-input { width: 100%; background: #1a1a1c; border: 0.5px solid #3a3a3c; border-radius: 5px; padding: 7px 9px; font-size: 12px; color: #c8c4bd; font-family: inherit; resize: vertical; min-height: 58px; outline: none; line-height: 1.6; }
.clause-body-input:focus { border-color: #5e5e63; }
.btn-del { background: none; border: none; cursor: pointer; color: #4e4e53; font-size: 13px; padding: 2px 4px; }
.btn-del:hover { color: #ff453a; }
.btn-add { width: 100%; background: #2a2a2c; border: 0.5px dashed #3a3a3c; border-radius: 6px; padding: 9px; font-size: 12px; color: #6e6e73; cursor: pointer; margin-top: 8px; font-family: inherit; transition: all .15s; }
.btn-add:hover { background: #3a3a3c; color: #e8e4dd; }
.btn-reset { width: 100%; background: transparent; border: 0.5px solid #3a3a3c; border-radius: 6px; padding: 7px; font-size: 11px; color: #6e6e73; cursor: pointer; margin-top: 6px; font-family: inherit; transition: all .15s; }
.btn-reset:hover { border-color: #5e5e63; color: #8e8e93; }

/* Footer */
.sidebar-footer { padding: 1rem 1.5rem 1.5rem; border-top: 0.5px solid #2e2e30; }
.btn-generate { width: 100%; padding: 13px; background: #e8e4dd; color: #1a1a1c; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; letter-spacing: 0.04em; transition: opacity .15s; }
.btn-generate:hover { opacity: 0.85; }

/* Preview */
.preview-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
.preview-toolbar h2 { font-size: 13px; font-weight: 500; color: #8e8e8e; }
.btn-print { padding: 9px 20px; background: #1a1a1c; color: #e8e4dd; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }
.btn-print:hover { opacity: 0.8; }
.preview-placeholder { text-align: center; padding: 5rem 2rem; color: #aaa; font-size: 14px; background: white; border-radius: 4px; max-width: 720px; margin: 0 auto; }

/* Document */
#doc-output { background: #fff; width: 100%; max-width: 720px; margin: 0 auto; padding: 20px 36px; border-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); font-family: 'Noto Serif TC', serif; font-size: 12px; line-height: 1.55; color: #1a1a1a; display: none; }
.doc-title { text-align: center; font-size: 16px; font-weight: 700; letter-spacing: 0.2em; margin-bottom: 0.6rem; padding-bottom: 0.5rem; border-bottom: 1.5px solid #1a1a1a; }
.doc-section-title { font-size: 12px; font-weight: 700; margin: 0.45rem 0 0.2rem; }
.agree-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 0.4rem; font-size: 12px; }
.agree-cell { border-bottom: 0.5px solid #999; padding-bottom: 3px; }
.alabel { font-size: 10px; color: #888; font-family: 'Noto Sans TC', sans-serif; margin-bottom: 1px; }
.clause-block { margin-bottom: 0.25rem; }
.c-head { font-weight: 700; }
.c-body { margin-left: 1.2rem; }
.fixed-clauses { margin-top: 0.3rem; font-size: 12px; }
.fixed-clauses p { margin-bottom: 0.15rem; text-indent: 2em; }
.sign-section { margin-top: 0.6rem; padding-top: 0.5rem; border-top: 0.5px solid #ccc; }
.sign-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-top: 0.4rem; }
.sign-box { border: 0.5px solid #ccc; border-radius: 4px; padding: 8px 12px; font-size: 12px; }
.sign-role { font-size: 12px; font-weight: 700; margin-bottom: 4px; }
.sign-info { font-size: 12px; margin-bottom: 2px; color: #1a1a1a; }
.sign-line { border-bottom: 0.5px solid #999; min-height: 36px; position: relative; margin-bottom: 4px; margin-top: 6px; }
.sign-line-addr { border-bottom: 0.5px solid #999; min-height: 20px; margin-bottom: 3px; margin-top: 6px; }
.stamp-circle { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); width: 40px; height: 40px; border-radius: 50%; border: 1.5px dashed #ccc; display: flex; align-items: center; justify-content: center; font-size: 8px; color: #bbb; text-align: center; line-height: 1.3; font-family: 'Noto Sans TC', sans-serif; }
.sign-name { font-size: 12px; }
.date-line { text-align: center; margin-top: 0.6rem; font-size: 12px; color: #333; letter-spacing: 0.1em; }
.ph { color: #ccc; font-style: italic; }

@keyframes spin { to { transform: rotate(360deg); } }
.spinner { width: 14px; height: 14px; border: 2px solid #4a4a4c; border-top-color: #e8e4dd; border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; }

/* ── 雙頁預覽樣式 ── */
.print-page { position: relative; padding-bottom: 2rem; }
.page-break { page-break-after: always; break-after: page; height: 0; }
.page-footer-label {
  text-align: center; font-size: 11px; color: #888;
  border-top: 0.5px solid #ccc; padding-top: 6px; margin-top: 1.5rem;
  letter-spacing: 0.05em; font-family: 'Noto Sans TC', sans-serif;
}

/* 預覽時兩份之間加分隔線 */
.page-break-preview {
  border: none; border-top: 2px dashed #ddd;
  margin: 2rem 0; max-width: 720px; margin-left: auto; margin-right: auto;
}

@media print {
  @page { size: A4 portrait; margin: 8mm 10mm; }
  body { background: white; }
  .app { display: block; }
  .sidebar, .preview-toolbar { display: none !important; }
  .preview-area { padding: 0; }
  #doc-output {
    box-shadow: none !important; width: 100% !important; max-width: 100% !important;
    padding: 0 !important; margin: 0 !important; border-radius: 0 !important;
    display: block !important; font-size: 11px !important; line-height: 1.45 !important;
  }
  .print-page { page-break-inside: avoid; break-inside: avoid; }
  .page-break { page-break-after: always; break-after: page; }
  #doc-output { font-size: 10.5px !important; line-height: 1.4 !important; }
  .doc-title { font-size: 14px !important; margin-bottom: 0.3rem !important; padding-bottom: 0.3rem !important; }
  .doc-section-title { margin: 0.25rem 0 0.1rem !important; font-size: 11px !important; }
  .clause-block { margin-bottom: 0.15rem !important; }
  .c-body { margin-left: 1rem !important; }
  .fixed-clauses { margin-top: 0.2rem !important; }
  .fixed-clauses p { margin-bottom: 0.08rem !important; text-indent: 1.5em !important; }
  .sign-section { margin-top: 0.4rem !important; padding-top: 0.3rem !important; }
  .sign-grid { gap: 0.4rem !important; }
  .sign-box { padding: 6px 8px !important; font-size: 10.5px !important; }
  .sign-line { min-height: 32px !important; }
  .agree-row { margin-bottom: 0.3rem !important; }
  .vehicle-info { margin-bottom: 0.3rem !important; }
  .page-footer-label { font-size: 10px !important; color: #555 !important; margin-top: 0.8rem !important; padding-top: 4px !important; }
  .save-notice { display: none !important; }
  #doc-preview-placeholder { display: none !important; }
  #records-view { display: none !important; }
}

/* ── View Tabs ── */
.view-tabs { display: flex; gap: 6px; }
.view-tab { padding: 7px 16px; border: 0.5px solid #ddd; border-radius: 6px; background: #f0ede8; color: #6e6e73; font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; transition: all .15s; }
.view-tab.active { background: #1a1a1c; color: #e8e4dd; border-color: #1a1a1c; }
.view-tab:hover:not(.active) { background: #e0ddd8; }

/* ── Save btn ── */
.btn-save { width: 100%; padding: 10px; background: #1e2e20; border: 0.5px solid #32d74b55; border-radius: 8px; font-size: 13px; font-weight: 600; color: #32d74b; cursor: pointer; font-family: inherit; margin-top: 8px; transition: all .15s; }
.btn-save:hover { background: #243024; }

/* ── Records ── */
.records-wrap { max-width: 900px; margin: 0 auto; }
.records-search-row { display: flex; align-items: center; gap: 12px; margin-bottom: 1rem; }
.records-search-row input { flex: 1; background: #fff; border: 0.5px solid #ddd; border-radius: 6px; padding: 8px 12px; font-size: 13px; font-family: inherit; outline: none; }
.records-search-row input:focus { border-color: #999; }
.rec-count { font-size: 12px; color: #8e8e93; white-space: nowrap; }
.rec-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); font-size: 13px; }
.rec-table th { background: #1a1a1c; color: #e8e4dd; padding: 10px 12px; text-align: left; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; white-space: nowrap; }
.rec-table td { padding: 9px 12px; border-bottom: 0.5px solid #f0ede8; color: #1a1a1a; vertical-align: middle; }
.rec-table tr:last-child td { border-bottom: none; }
.rec-table tr:hover td { background: #f8f6f2; }
.rec-no { color: #8e8e93; font-size: 11px; }
.rec-empty { text-align: center; padding: 3rem; color: #aaa; font-size: 14px; }
.btn-del-rec { background: none; border: 0.5px solid #ffb3b3; border-radius: 4px; color: #ff453a; font-size: 11px; padding: 3px 8px; cursor: pointer; font-family: inherit; transition: all .15s; }
.btn-del-rec:hover { background: #fff0f0; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
<div class="app">

<!-- ════ Sidebar ════ -->
<aside class="sidebar">
<div class="sidebar-inner">

  <div class="sidebar-header">
    <div class="logo-row">
      <div class="logo-badge">MG</div>
      <h1>協議書產生工具</h1>
    </div>
    <div class="sub">銘勁汽車股份有限公司｜顧客關係部</div>
  </div>

  <!-- Mode -->
  <div class="mode-tabs">
    <button class="tab-btn active" id="tab-manual" onclick="switchMode('manual')">✏️ 手動填寫</button>
    <button class="tab-btn" id="tab-pdf" onclick="switchMode('pdf')">📄 特案報告匯入</button>
  </div>

  <!-- PDF Section -->
  <div id="pdf-section" style="display:none;">
    <div class="upload-section">
      <div class="section-label">上傳特案報告 PDF</div>
      <div class="upload-zone" id="upload-zone">
        <input type="file" accept=".pdf" id="pdf-input" onchange="onFileSelected(event)">
        <div class="uz-icon">📋</div>
        <div class="uz-title" id="uz-title">點擊或拖曳 PDF 至此</div>
        <div class="uz-sub">CS案件報告書 / 交車異常處理單</div>
      </div>
      <button class="btn-parse" id="btn-parse" onclick="parsePDF()" disabled>
        <span id="parse-btn-text">🔍 解析報告</span>
      </button>
      <div class="parse-status" id="parse-status"></div>
      <div class="parse-result-box" id="parse-result-box">
        <div class="pr-title">解析結果</div>
        <div id="parse-result-items"></div>
      </div>
    </div>
  </div>

  <!-- 需補填提示 -->
  <div class="manual-required" id="manual-required">
    <div class="mr-title">⚠️ 以下欄位需人工補填</div>
    <div id="missing-fields-list"></div>
  </div>

  <!-- 乙方 -->
  <div class="section">
    <div class="section-label">乙方（客戶）資料</div>
    <div class="field"><label>姓名</label><input type="text" id="f-name" placeholder="例：林松德"></div>
    <div class="field"><label>身分證字號</label><input type="text" id="f-id" placeholder="A123456789"></div>
    <div class="field"><label>住址</label><input type="text" id="f-addr" placeholder="縣市區路號"></div>
  </div>

  <!-- 甲方 -->
  <div class="section">
    <div class="section-label">甲方（服務廠）資料</div>
    <div class="field">
      <label>服務廠／營業所</label>
      <select id="f-branch" onchange="onBranchChange()">
        <option value="">請選擇</option>
        <option value="中壢服務廠">中壢服務廠</option>
        <option value="八德服務廠">八德服務廠</option>
        <option value="中壢營業所">中壢營業所</option>
        <option value="八德營業所">八德營業所</option>
        <option value="桃園營業所">桃園營業所</option>
      </select>
    </div>
    <div class="field"><label>代表人</label><input type="text" id="f-rep" placeholder="選擇服務廠後自動帶入"></div>
  </div>

  <!-- 車輛 -->
  <div class="section">
    <div class="section-label">車輛資訊</div>
    <div class="field"><label>引擎號碼</label><input type="text" id="f-eng" placeholder=""></div>
    <div class="field"><label>車牌號碼</label><input type="text" id="f-plate" placeholder=""></div>
    <div class="field-row">
      <div class="field">
        <label>細車型</label>
        <select id="f-model">
          <option value="">請選擇</option>
          <option value="HS 1.5T">HS 1.5T</option>
          <option value="HS 2.0">HS 2.0</option>
          <option value="HS PHEV">HS PHEV</option>
          <option value="ZS">ZS</option>
          <option value="G50 PLUS">G50 PLUS</option>
        </select>
      </div>
      <div class="field">
        <label>車色</label>
        <select id="f-color">
          <option value="">請選擇</option>
          <option value="白">白</option>
          <option value="黑">黑</option>
          <option value="灰">灰</option>
          <option value="銀">銀</option>
          <option value="藍">藍</option>
          <option value="紅">紅</option>
          <option value="橘">橘</option>
        </select>
      </div>
    </div>
  </div>

  <!-- 原因 -->
  <div class="section">
    <div class="section-label">協議原因</div>
    <div class="field"><textarea id="f-reason" rows="2">新車顧客滿意補償方案</textarea></div>
  </div>

  <!-- 條款 -->
  <div class="section">
    <div class="section-label">協議條款</div>
    <div class="clause-list" id="clause-list"></div>
    <button class="btn-add" onclick="addClause()">＋ 新增條款</button>
    <button class="btn-reset" onclick="resetClauses()">↺ 重置為預設條款</button>
  </div>

  <!-- 日期 -->
  <div class="section">
    <div class="section-label">簽立日期（民國）</div>
    <div class="field-row-3">
      <div class="field"><label>年</label><input type="number" id="f-year" placeholder="114"></div>
      <div class="field"><label>月</label><input type="number" id="f-month" placeholder="" min="1" max="12"></div>
      <div class="field"><label>日</label><input type="number" id="f-day" placeholder="" min="1" max="31"></div>
    </div>
  </div>

</div>
<div class="sidebar-footer">
  <button class="btn-generate" onclick="generateDoc()">產生協議書預覽</button>
  <button class="btn-save" onclick="saveRecord()" id="btn-save" style="display:none;">💾 儲存檔案</button>
</div>
</aside>

<!-- ════ Preview ════ -->
<main class="preview-area">
  <div class="preview-toolbar">
    <div class="view-tabs">
      <button class="view-tab" onclick="window.location.href='cs-report.html'" style="color:#c8a96e; border-color:#c8a96e55;">↩ 特案報告</button>
      <button class="view-tab active" id="vtab-doc" onclick="switchView('doc')">協議書預覽</button>
      <button class="view-tab" id="vtab-records" onclick="switchView('records')">📋 紀錄管理</button>

if (typeof pdfjsLib !== 'undefined') {

// ══ 預設條款 ══
const DEFAULT_CLAUSES = [
  { title: '復原方案', body: '予以【　　　　修復】（依據品牌標準規範），車輛復原後之保固：車主手冊【經銷商服務保證內容】。\n車輛復原日：________________（雙方確認後簽章：_____________________ / ____________________）' },

  { title: '代步車', body: '車輛復原期間，提供品牌代步車。' },
  { title: '修復費用', body: '修復費用金：$　　　元實報實銷（抬頭/統編：銘勁汽車股份有限公司/90132360）。' },
  { title: '特案補償配件', body: '銘勁汽車特案補償方案：（以上均為原廠配件）' }

let clauses = JSON.parse(JSON.stringify(DEFAULT_CLAUSES));
let currentMode = 'manual';
let pdfFile = null;

// ══ 模式切換 ══
function switchMode(mode) {
  currentMode = mode;
  document.getElementById('tab-manual').className = 'tab-btn' + (mode==='manual'?' active':'');
  document.getElementById('tab-pdf').className = 'tab-btn' + (mode==='pdf'?' active':'');

// ══ PDF 上傳 ══
function onFileSelected(e) {
  const file = e.target.files[0];
  if (!file) return;
  pdfFile = file;
  document.getElementById('upload-zone').classList.add('has-file');
  document.getElementById('uz-title').textContent = '✓ ' + file.name;
  document.getElementById('btn-parse').disabled = false;
  document.getElementById('parse-status').textContent = '';
  document.getElementById('parse-status').className = 'parse-status';
  document.getElementById('parse-result-box').style.display = 'none';
}

// Drag & Drop
window.addEventListener('DOMContentLoaded', () => {
  const zone = document.getElementById('upload-zone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag');
    const file = e.dataTransfer.files[0];
    if (file && file.type === 'application/pdf') {
      const dt = new DataTransfer(); dt.items.add(file);
      document.getElementById('pdf-input').files = dt.files;
      onFileSelected({ target: { files: [file] } });
    }
  });
  renderClauses();
});

// ══ PDF 解析（pdf.js 萃取文字 + 規則比對）══
async function parsePDF() {
  if (!pdfFile) return;
  setParseBtn(true);
  setParseStatus('讀取 PDF...', 'info');

  try {
    const arrayBuffer = await pdfFile.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let fullText = '';
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      fullText += content.items.map(item => item.str).join(' ') + '\n';
    }

    setParseStatus('分析欄位...', 'info');
    const result = extractFields(fullText);
    applyParsedData(result);

  } catch(e) {
    setParseStatus('解析失敗：' + e.message, 'err');
    console.error(e);
  } finally {
    setParseBtn(false);
  }
}

// ══ 規則比對萃取 ══
function extractFields(text) {
  // 清理文字
  const t = text.replace(/\s+/g, ' ').trim();

  const result = {
    customer_name: '',
    vehicle_info: '',   // 原始字串 CFJ5886/4240225/HS 白
    plate: '',
    engine: '',
    model: '',
    color: '',
    amount: '',
    reason: '新車顧客滿意補償方案',
    raw_content: t
  };

  // 顧客姓名
  const namePatterns = [
    /顧客姓名[：:\s]+([^\s　車身]{2,5})/,
    /姓名[：:\s]+([^\s　車身]{2,5})/
  ];
  for (const p of namePatterns) {
    const m = t.match(p);
    if (m && m[1] && !m[1].includes('CFJ') && !m[1].includes('/')) {
      result.customer_name = m[1].trim();
      break;
    }
  }

  // 車號/引擎碼複合欄位（例：CFJ5886/4240225/HS 白）
  const vehiclePatterns = [
    /車號[\/\s]?引擎碼[：:\s]+([A-Z0-9\-]{5,10})[\/\s]+([A-Z0-9]{6,12})[\/\s]+([A-Z0-9]+)\s*([白黑銀灰紅藍綠棕橙黃金珍珠深淺][\w]*)/i,
    /車號[\/\s]?引擎碼[：:\s]+([A-Z]{3}[\-]?[0-9]{4})[\/\s]([A-Z0-9\/\s白黑銀灰紅藍]+)/i,
    /([A-Z]{3}[\-]?[0-9]{4})[\/\s]*([0-9]{7,10})[\/\s]*([A-Z0-9]+)\s*([白黑銀灰紅藍綠棕橙黃金珍珠深淺]+)/i
  ];

  for (const p of vehiclePatterns) {
    const m = t.match(p);
    if (m) {
      result.plate = m[1] ? m[1].replace(/([A-Z]{3})([0-9]{4})/, '$1-$2') : '';
      result.engine = m[2] || '';
      result.model = m[3] || '';
      result.color = m[4] || '';
      break;
    }
  }

  // 若上面沒抓到，單獨找車牌
  if (!result.plate) {
    const pm = t.match(/([A-Z]{2,3}[-\s]?[A-Z0-9]?[0-9]{3,4})/);
    if (pm) result.plate = pm[1].replace(/\s/g,'');
  }

  // 申請金額
  const amtM = t.match(/申請金額[：:\s]*(\d[\d,]+)/);
  if (amtM) result.amount = amtM[1];

  // 主旨/原因
  const subjM = t.match(/主旨[：:\s]+([^。\n]{4,40})/);
  if (subjM) result.reason_raw = subjM[1].trim();

  return result;
}

// ══ 套用解析結果 ══
function applyParsedData(data) {
  const fieldMap = {
    'f-name': data.customer_name,
    'f-plate': data.plate,
    'f-eng': data.engine,
    'f-model': data.model,
    'f-color': data.color
  };

  let filledCount = 0;
  const resultItems = [];
  const missingFields = [];

  Object.entries(fieldMap).forEach(([id, val]) => {
    const el = document.getElementById(id);
    const labelMap = { 'f-name':'顧客姓名', 'f-plate':'車牌號碼', 'f-eng':'引擎號碼', 'f-model':'車型', 'f-color':'車色' };
    if (val && val.trim()) {
      el.value = val.trim();
      el.classList.add('ai-filled');
      setTimeout(() => el.classList.remove('ai-filled'), 2000);
      filledCount++;
      resultItems.push({ key: labelMap[id], val: val.trim(), ok: true });
    } else {
      resultItems.push({ key: labelMap[id], val: '未找到', ok: false });
      missingFields.push(labelMap[id]);
    }
  });

  // 固定需人工補填
  ['身分證字號','住址','代表人','簽立日期'].forEach(f => missingFields.push(f));

  // 條款：根據金額自動調整
  buildClauses(data);

  // 顯示解析結果
  const box = document.getElementById('parse-result-box');
  box.style.display = 'block';
  document.getElementById('parse-result-items').innerHTML = resultItems.map(r =>
    `<div class="parse-result-item"><span class="pk">${r.key}</span><span class="pv ${r.ok?'':'missing'}">${r.val}</span></div>`
  ).join('');

  // 顯示需補填欄位
  const req = document.getElementById('manual-required');
  req.style.display = 'block';
  document.getElementById('missing-fields-list').innerHTML = missingFields.map(f => `• ${f}`).join('　');

  setParseStatus(`✓ 解析完成，已填入 ${filledCount} 個欄位`, 'ok');
}

// ══ 根據報告內容自動建立條款 ══
function buildClauses(data) {
  const t = data.raw_content || '';
  const newClauses = [];

  // 1. 保養次數
  const yangs = [];
  if (/1000[\s公里]*免費保養/.test(t)) yangs.push('【1000公里免費保養乙次】');
  if (/1萬|一萬|10000|1[\s]*萬[\s]*公里/.test(t)) yangs.push('【1萬公里免費保養乙次】');
  if (/2萬|二萬|20000|2[\s]*萬[\s]*公里/.test(t)) yangs.push('【2萬公里免費保養乙次】');
  if (/首次保養|第一次保養/.test(t)) yangs.push('【首次免費保養乙次】');
  if (yangs.length > 0) {
    newClauses.push({ title: '補償保養', body: `予以${yangs.join('、')}（其保養範圍依據車主手冊之規範內容）。` });
  }

  // 2. 代步車
  if (/代步車/.test(t)) {
    newClauses.push({ title: '代步車', body: '車輛修復期間，提供品牌代步車。' });
  }

  // 3. 金額補貼（掃所有金額）
  const amtMatches = [...t.matchAll(/(\d[\d,]+)\s*元/g)];
  const amounts = [...new Set(amtMatches.map(m => m[1].replace(/,/g,'')).filter(a => parseInt(a) >= 500))];
  amounts.forEach(amt => {
    // 判斷類型
    if (/引擎下護板|護板/.test(t) && parseInt(amt) >= 2000) {
      newClauses.push({ title: '引擎下護板', body: `銘勁汽車誠意補償原廠引擎下護板，市值 $${parseInt(amt).toLocaleString()} 元（原廠配件）。` });
    } else if (/護板費用|費用補貼|半數|一半/.test(t)) {
      newClauses.push({ title: '費用補貼', body: `甲方補貼護板費用 $${parseInt(amt).toLocaleString()} 元（實報實銷，抬頭/統編：銘勁汽車股份有限公司/90132360）。` });
    }
  });

  // 4. 申請金額（若無上述明確項目則用申請金額）
  if (newClauses.length <= 1 && data.amount) {
    newClauses.push({ title: '補償費用', body: `補償金額：$${parseInt(data.amount).toLocaleString()} 元（實報實銷，抬頭/統編：銘勁汽車股份有限公司/90132360）。` });
  }

  // 5. 配件
  const parts = [];
  if (/防水腳踏墊|腳踏墊/.test(t)) parts.push('防水腳踏墊');
  if (/後行李廂防水墊|行李廂/.test(t)) parts.push('後行李廂防水墊');
  if (/晴雨窗/.test(t)) parts.push('晴雨窗');
  if (/引擎下護板/.test(t) && !newClauses.find(c => c.title==='引擎下護板')) parts.push('引擎下護板');
  if (parts.length > 0) {
    newClauses.push({ title: '特案補償配件', body: `銘勁汽車特案補償方案：${parts.join('、')}。（以上均為原廠配件）` });
  }

  // 若什麼都沒抓到，保留預設
  if (newClauses.length === 0) {
    clauses = JSON.parse(JSON.stringify(DEFAULT_CLAUSES));
  } else {
    clauses = newClauses;
  }
  renderClauses();
}

// ══ 條款管理 ══
const CN = ['一','二','三','四','五','六','七','八','九','十','十一','十二'];
function cnNum(n) { return CN[n-1] || n; }

function renderClauses() {
  const list = document.getElementById('clause-list');
  list.innerHTML = '';
  clauses.forEach((c, i) => {
    const item = document.createElement('div');
    item.className = 'clause-item';
    item.innerHTML = `
      <div class="clause-header">
        <span class="clause-num">(${cnNum(i+1)})</span>
        <input class="clause-title-input" type="text" value="${escAttr(c.title)}" oninput="clauses[${i}].title=this.value" placeholder="條款標題">
        <button class="btn-del" onclick="removeClause(${i})" title="刪除">✕</button>
      </div>
      <textarea class="clause-body-input" oninput="clauses[${i}].body=this.value">${esc(c.body)}</textarea>
    `;
    list.appendChild(item);
  });
}

function addClause() { clauses.push({ title: '新條款', body: '' }); renderClauses(); }
function removeClause(i) { if (clauses.length > 1) { clauses.splice(i, 1); renderClauses(); } }
function resetClauses() { clauses = JSON.parse(JSON.stringify(DEFAULT_CLAUSES)); renderClauses(); }

// ══ UI 工具 ══
function setParseBtn(loading) {
  document.getElementById('btn-parse').disabled = loading;
  document.getElementById('parse-btn-text').innerHTML = loading
    ? '<span class="spinner"></span> 解析中...' : '🔍 解析報告';
}
function setParseStatus(msg, cls) {
  const el = document.getElementById('parse-status');
  el.textContent = msg;
  el.className = 'parse-status' + (cls ? ' ' + cls : '');
}
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function val(id) { return (document.getElementById(id).value||'').trim(); }
function ph(v, blank) { return v ? esc(v) : `<span class="ph">${blank}</span>`; }

// ══════════════════════════════════════
// 紀錄管理
// ══════════════════════════════════════
const RECORDS_KEY = 'mg_agreement_records';
const AGR_API_URL = 'https://script.google.com/macros/s/AKfycbxxuBWzvbjXkuEkvOKgrBQ4lBPX4XOkpbp4z2uw8U2L2TY8ojoRLJPkheLBOaTC42e6/exec';
const USE_SHEETS_AGR = true;

// ── Google Sheets API（協議書）──
async function agrApiGet() {
  const res = await fetch(AGR_API_URL + '?action=getAll&type=agreement');
  const json = await res.json();
  return json.ok ? json.data : [];
}
async function agrApiSave(record) {
  await fetch(AGR_API_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'save', type: 'agreement', record })
  });
}
async function agrApiDelete(id) {
  await fetch(AGR_API_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'delete', type: 'agreement', id })
  });
}

function loadRecords() {
  try { return JSON.parse(localStorage.getItem(RECORDS_KEY)) || []; }
  catch(e) { return []; }
}
function saveRecordsData(records) {
  localStorage.setItem(RECORDS_KEY, JSON.stringify(records));
}
function genId() {
  const now = new Date();
  const y = now.getFullYear() - 1911;
  const m = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  const records = loadRecords();
  const prefix = y + m + d;
  const count = records.filter(r => r.id && r.id.startsWith(prefix)).length + 1;
  return prefix + '-' + String(count).padStart(2,'0');
}
async function saveRecord() {
  const name   = val('f-name');
  const plate  = val('f-plate');
  const branch = val('f-branch');
  const year   = val('f-year');
  const month  = val('f-month');
  const day    = val('f-day');
  if (!name || !plate) { alert('請至少填寫「消費者姓名」及「車牌號碼」再儲存。'); return; }
  const dateStr = (year && month && day)
    ? year + '/' + month.padStart(2,'0') + '/' + day.padStart(2,'0')
    : new Date().toLocaleDateString('zh-TW', {year:'numeric',month:'2-digit',day:'2-digit'});
  const record = {
    id: genId(), date: dateStr, branch: branch || '（未選擇）',
    plate: plate, name: name, model: val('f-model'),
    color: val('f-color'), reason: val('f-reason'), createdAt: Date.now()
  };
  try {
    if (USE_SHEETS_AGR) await agrApiSave(record);
    const records = loadRecords();
    records.unshift(record);
    saveRecordsData(records);
    renderRecords();
    switchView('records');
    alert('✓ 已儲存紀錄 ' + record.id);
  } catch(e) {
    alert('儲存失敗：' + e.message);
  }
}
async function deleteRecord(id) {
  if (!confirm('確定刪除紀錄 ' + id + '？')) return;
  try {
    if (USE_SHEETS_AGR) await agrApiDelete(id);
    saveRecordsData(loadRecords().filter(function(r){ return r.id !== id; }));
    renderRecords();
  } catch(e) {
    alert('刪除失敗：' + e.message);
  }
}
function renderRecords() {
  const kw = (document.getElementById('rec-search') ? document.getElementById('rec-search').value : '').trim().toLowerCase();
  let records = loadRecords();
  if (kw) {
    records = records.filter(function(r){
      return (r.plate||'').toLowerCase().includes(kw) ||
             (r.name||'').toLowerCase().includes(kw) ||
             (r.branch||'').toLowerCase().includes(kw) ||
             (r.id||'').toLowerCase().includes(kw);
    });
  }
  const countEl = document.getElementById('rec-count');
  if (countEl) countEl.textContent = '共 ' + records.length + ' 筆';
  const wrap = document.getElementById('records-table-wrap');
  if (!wrap) return;
  if (records.length === 0) {
    wrap.innerHTML = '<div class="rec-empty">' + (kw ? '找不到符合的紀錄' : '尚無紀錄，產生協議書後點擊「儲存檔案」') + '</div>';
    return;
  }
  let rows = '';
  records.forEach(function(r) {
    rows += '<tr><td class="rec-no">' + esc(r.id) + '</td>' +
      '<td style="max-width:160px;color:#444;font-size:12px;">' + esc((r.reason||'').substring(0,25)) + ((r.reason||'').length>25?'…':'') + '</td>' +
      '<td>' + esc(r.branch) + '</td>' +
      '<td><strong>' + esc(r.plate) + '</strong></td>' +
      '<td>' + esc(r.name) + '</td>' +
      '<td>' + esc(r.model||'') + (r.color ? ' / '+esc(r.color) : '') + '</td>' +
      '<td style="white-space:nowrap;font-size:12px;color:#666;">' + esc(r.date||'') + '</td>' +
      '<td><button class="btn-del-rec" onclick="deleteRecord(\'' + r.id + '\')">刪除</button></td></tr>';
  });
  wrap.innerHTML = '<table class="rec-table"><thead><tr>' +
    '<th>編號</th><th>原因</th><th>責任單位</th><th>車號</th><th>消費者姓名</th><th>車型／車色</th><th>日期</th><th></th>' +
    '</tr></thead><tbody>' + rows + '</tbody></table>';
}
async function saveAndPrint() {
  const doc = document.getElementById('doc-output');
  if (!doc || doc.style.display === 'none') { alert('請先產生協議書預覽再列印'); return; }
  await saveRecord();
  window.print();
}

function savePDF() {
  const doc = document.getElementById('doc-output');
  if (!doc || doc.style.display === 'none') { alert('請先產生協議書預覽再存 PDF'); return; }
  const name   = document.getElementById('f-name')?.value || '';
  const plate  = document.getElementById('f-plate')?.value || '';
  const branch = document.getElementById('f-branch')?.value || '';
  const filename = 'MG協議書_' + (branch||'') + '_' + (name||'') + '_' + (plate||'未填車牌') + '.pdf';

  const btn = event.target;
  btn.textContent = '⏳ 產生中...';
  btn.disabled = true;

  html2pdf().set({
    margin: [6, 10, 6, 10],
    filename: filename,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true, logging: false },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
  }).from(doc).save().then(() => {
    btn.textContent = '⬇ 存 PDF';
    btn.disabled = false;
  }).catch(e => {
    btn.textContent = '⬇ 存 PDF';
    btn.disabled = false;
    alert('PDF 產生失敗，請改用列印功能');
  });
}

function exportCSV() {
  const records = loadRecords();
  if (records.length === 0) { alert('目前沒有紀錄可匯出'); return; }
  const headers = ['編號','日期','責任單位','車號','消費者姓名','車型','車色','協議原因'];
  const rows = records.map(function(r){
    return [r.id,r.date,r.branch,r.plate,r.name,r.model,r.color,r.reason]
      .map(function(v){ return '"' + (v||'').replace(/"/g,'""') + '"'; }).join(',');
  });
  const bom = '\uFEFF';
  const csv = bom + headers.join(',') + '\n' + rows.join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '銘勁汽車協議書紀錄_' + new Date().toLocaleDateString('zh-TW').replace(/\//g,'-') + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}
function switchView(view) {
  const isDoc = view === 'doc';
  document.getElementById('vtab-doc').className = 'view-tab' + (isDoc ? ' active' : '');
  document.getElementById('vtab-records').className = 'view-tab' + (!isDoc ? ' active' : '');
  const docOut = document.getElementById('doc-output');
  const placeholder = document.getElementById('doc-preview-placeholder');
  const recView = document.getElementById('records-view');
  if (isDoc) {
    docOut.style.display = docOut.innerHTML ? 'block' : 'none';
    placeholder.style.display = docOut.innerHTML ? 'none' : 'block';
    recView.style.display = 'none';
    document.getElementById('toolbar-doc-btns').style.display = 'block';
    document.getElementById('toolbar-rec-btns').style.display = 'none';
  } else {
    docOut.style.display = 'none';
    placeholder.style.display = 'none';
    recView.style.display = 'block';
    document.getElementById('toolbar-doc-btns').style.display = 'none';
    document.getElementById('toolbar-rec-btns').style.display = 'block';
    renderRecords();
  }
}

// ══ 從特案報告工具接收預填資料 ══
function checkPrefill() {
  try {
    const raw = localStorage.getItem('mg_agreement_prefill');
    if (!raw) return;
    const data = JSON.parse(raw);
    if (!data.from_cs) return;
    // 超過5分鐘不自動填入
    if (Date.now() - data.ts > 5 * 60 * 1000) { localStorage.removeItem('mg_agreement_prefill'); return; }

    const fields = {
      'f-name':  data.name,
      'f-plate': data.plate,
      'f-eng':   data.engine,
      'f-color': data.color,
      'f-reason': data.reason
    };
    Object.entries(fields).forEach(([id, v]) => {
      if (v) { const el = document.getElementById(id); if(el) el.value = v; }
    });
    // 車型下拉
    if (data.model) {
      const modelEl = document.getElementById('f-model');
      if (modelEl) {
        [...modelEl.options].forEach(opt => {
          if (opt.value.includes(data.model) || data.model.includes(opt.value.replace(/\s/g,''))) {
            modelEl.value = opt.value;
          }
        });
      }
    }
    localStorage.removeItem('mg_agreement_prefill');
    // 顯示提示
    const notice = document.createElement('div');
    notice.style.cssText = 'position:fixed;top:16px;right:16px;background:#1e2e20;color:#32d74b;border:0.5px solid #32d74b55;border-radius:8px;padding:10px 16px;font-size:13px;z-index:999;font-family:sans-serif;';
    notice.textContent = '✓ 已從特案報告 ' + data.cs_id + ' 帶入資料';
    document.body.appendChild(notice);
    setTimeout(() => notice.remove(), 3500);
  } catch(e) {}
}
